<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI乡村共创系统 · 智能总管</title>
<style>
:root {
  --body: #3A2A1A; --bodyLight: #4A3A2A; --screen: #1A1008;
  --screenText: #F5A623; --accent: #C8965A; --accent2: #8B6914;
  --techBlue: #3A7BD5; --techCyan: #4ECDC4; --alertRed: #D94A4A;
  --panelBg: #151012; --bubbleBg: #1E1814; --text: #D8D0C8;
  --textLight: #F0E8E0; --muted: #908070;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: "Microsoft YaHei", sans-serif;
  background: transparent;
  width: 100%; min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  user-select: none;
}
/* 主容器 —— 适配PPT Web Viewer侧窗 */
.container {
  width: 260px; padding: 16px 12px 12px;
  background: linear-gradient(180deg, #1A1210 0%, #0F0B08 100%);
  border-radius: 16px;
  border: 1px solid #3A2820;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.03);
}

/* ===== 机器人形象 ===== */
.robot-wrap {
  position: relative; cursor: pointer;
  transition: transform 0.2s;
}
.robot-wrap:hover { transform: scale(1.04); }
.robot-wrap:active { transform: scale(0.96); }

/* 天线 */
.antenna {
  width: 2px; height: 18px; background: #5A4A3A;
  margin: 0 auto 2px; position: relative;
}
.antenna::after {
  content: ""; position: absolute; top: -4px; left: -3px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--techBlue);
  box-shadow: 0 0 8px var(--techBlue), 0 0 16px var(--techBlue);
  animation: glowPulse 2s ease-in-out infinite;
}
@keyframes glowPulse {
  0%,100% { opacity: 0.6; box-shadow: 0 0 6px var(--techBlue); }
  50% { opacity: 1; box-shadow: 0 0 14px var(--techBlue), 0 0 24px var(--techCyan); }
}

/* 头部 */
.head {
  width: 64px; height: 56px; background: linear-gradient(180deg, var(--bodyLight) 0%, var(--body) 100%);
  border-radius: 16px 16px 10px 10px; position: relative;
  border: 2px solid #5A4A3A;
}
/* 屏幕脸 */
.face-screen {
  position: absolute; top: 10px; left: 10px; right: 10px; bottom: 16px;
  background: var(--screen); border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid #2A1A08; overflow: hidden;
}
/* 眼睛 */
.eyes {
  display: flex; gap: 10px;
}
.eye {
  width: 8px; height: 10px; background: var(--screenText);
  border-radius: 3px;
  animation: blink 4s ease-in-out infinite;
}
.eye:nth-child(2) { animation-delay: 0.1s; }
@keyframes blink {
  0%,95%,100% { transform: scaleY(1); }
  97% { transform: scaleY(0.1); }
}
/* 嘴巴 —— 说话时亮起 */
.mouth {
  position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
  width: 16px; height: 3px; background: #3A2A1A; border-radius: 2px;
  transition: all 0.3s;
}
.mouth.speaking {
  background: var(--techCyan); width: 20px; height: 4px;
  box-shadow: 0 0 6px var(--techCyan);
}

/* 身体 */
.body {
  width: 50px; height: 36px; background: linear-gradient(180deg, var(--body) 0%, #2A1A10 100%);
  border-radius: 6px 6px 14px 14px; margin-top: -2px;
  border: 2px solid #5A4A3A; border-top: none;
  position: relative; display: flex; align-items: center; justify-content: center;
}
/* 核心灯 */
.core-light {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--techBlue);
  box-shadow: 0 0 6px var(--techBlue);
  animation: coreBeat 1.5s ease-in-out infinite;
}
@keyframes coreBeat {
  0%,100% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(1.2); opacity: 1; }
}

/* ===== 点击提示 ===== */
.click-hint {
  font-size: 9px; color: var(--muted); text-align: center;
  animation: hintPulse 3s ease-in-out infinite;
}
@keyframes hintPulse {
  0%,100% { opacity: 0.4; }
  50% { opacity: 0.8; }
}

/* ===== 对话气泡 ===== */
.speech-bubble {
  width: 100%; background: var(--bubbleBg); border-radius: 12px;
  padding: 10px 12px; position: relative; display: none;
  border: 1px solid #3A2820;
}
.speech-bubble::before {
  content: ""; position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 8px solid transparent; border-right: 8px solid transparent;
  border-bottom: 8px solid #3A2820;
}
.speech-bubble::after {
  content: ""; position: absolute; top: -6px; left: 50%; transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 7px solid transparent; border-right: 7px solid transparent;
  border-bottom: 7px solid var(--bubbleBg);
}
.speech-bubble.show { display: block; animation: bubbleIn 0.3s ease; }
@keyframes bubbleIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.bubble-text {
  font-size: 12px; color: var(--text); line-height: 1.6;
}
.bubble-label {
  font-size: 9px; color: var(--accent); margin-bottom: 4px; font-weight: bold;
}

/* ===== 页面标签 ===== */
.page-tag {
  font-size: 9px; color: var(--muted); text-align: center;
  padding: 3px 10px; background: #0D0A06; border-radius: 10px;
  border: 1px solid #2A1A10;
}

/* ===== 状态指示灯 ===== */
.status-row {
  display: flex; align-items: center; gap: 8px; width: 100%;
  padding: 0 4px;
}
.status-indicator {
  display: flex; align-items: center; gap: 4px; font-size: 8px; color: var(--muted);
}
.status-indicator .dot {
  width: 5px; height: 5px; border-radius: 50%;
}
.dot.green { background: #4CAF50; box-shadow: 0 0 4px #4CAF50; }
.dot.blue { background: var(--techBlue); box-shadow: 0 0 4px var(--techBlue); }

/* ===== 滚动条 ===== */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #3A2820; border-radius: 2px; }
</style>

// ===== 获取当前页面参数 =====

document.getElementById("bubbleText").textContent = pageData.text;

// ===== 说话功能 =====
let isSpeaking = false;

function speak() {
  const robot = document.getElementById("robot");
  const bubble = document.getElementById("bubble");
  const mouth = document.getElementById("mouth");
  const hint = document.getElementById("clickHint");
  const text = pageData.text;

  // 如果正在说话，停止
  if (isSpeaking) {
    speechSynthesis.cancel();
    isSpeaking = false;
    mouth.classList.remove("speaking");
    bubble.classList.remove("show");
    hint.textContent = "👆 点击机器人播报重点";
    robot.style.transform = "";
    return;
  }

  // 显示气泡
  bubble.classList.add("show");
  hint.textContent = "🔊 正在播报... (点击停止)";

  // 嘴巴动画
  mouth.classList.add("speaking");

  // TTS 语音播报
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "zh-CN";
  utterance.rate = 0.95;
  utterance.pitch = 1.05;
  utterance.volume = 0.9;

  // 尝试选择中文语音
  const voices = speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang.startsWith("zh-CN") || v.lang.startsWith("zh-TW"));
  if (zhVoice) utterance.voice = zhVoice;

  isSpeaking = true;

  utterance.onend = () => {
    isSpeaking = false;
    mouth.classList.remove("speaking");
    hint.textContent = "👆 点击机器人播报重点";
  };

  utterance.onerror = () => {
    isSpeaking = false;
    mouth.classList.remove("speaking");
    hint.textContent = "👆 点击机器人播报重点";
    // 有些浏览器需要用户交互后才允许TTS，静默失败
  };

  speechSynthesis.speak(utterance);
}

// 预加载语音列表
speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
speechSynthesis.getVoices();

// ===== 也允许点击气泡关闭 =====
document.getElementById("bubble").addEventListener("click", function(e) {
  if (isSpeaking) speak(); // 停止说话
});
</script>
</body>
