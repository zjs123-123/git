<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>云岭村 · 乡村共创平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#e8e8e8;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{text-align:center;padding:40px}
h1{font-size:48px;margin-bottom:12px;background:linear-gradient(135deg,#e8dcc8,#c8b878);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:20px;color:#8a8a8a;margin-bottom:60px}
.cards{display:flex;gap:30px;flex-wrap:wrap;justify-content:center}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:40px 30px;width:280px;text-decoration:none;color:#e8e8e8;transition:all .3s;backdrop-filter:blur(10px)}
.card:hover{background:rgba(255,255,255,0.1);transform:translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,0.3)}
.card .icon{font-size:48px;margin-bottom:20px}
.card h3{font-size:24px;margin-bottom:10px}
.card p{font-size:15px;color:#9a9a9a;line-height:1.6}
.footer{margin-top:60px;color:#555;font-size:14px}
</style>
</head>
<body>
<div class="container">
  <h1>🌾 云岭村 · 乡村共创平台</h1>
  <p class="sub">乡村振兴·智能体驱动任务协作系统</p>
  <div class="cards">
    <a href="task-platform.html" class="card">
      <div class="icon">🤖</div>
      <h3>任务协作平台</h3>
      <p>AI智能体驱动的乡村共创任务管理</p>
    </a>
    <a href="teacher.html" class="card">
      <div class="icon">👩‍🏫</div>
      <h3>教师端</h3>
      <p>方案模拟与数据分析，教学管理与指导</p>
    </a>
    <a href="student.html" class="card">
      <div class="icon">🎓</div>
      <h3>学生端</h3>
      <p>任务提交与分析，学习成果展示</p>
    </a>
  </div>
  <p class="footer">云岭村乡村振兴项目 · AI智能体平台</p>
</div>
</body>
</html>
